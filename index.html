<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pomodoro Timer</title>
    <link href="https://cdn.jsdelivr.net/npm/tailwindcss@2.2.19/dist/tailwind.min.css" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body class="bg-gray-900 text-white flex items-center justify-center min-h-screen font-sans">
    <div class="bg-gray-800 p-8 rounded-lg shadow-lg text-center">
        <h1 class="text-4xl font-bold mb-4">Pomodoro Timer</h1>
        <div class="text-8xl font-bold mb-8" id="timer">25:00</div>
        <div class="flex justify-center space-x-4">
            <button id="start-btn" class="bg-green-500 hover:bg-green-600 text-white font-bold py-2 px-4 rounded">Start</button>
            <button id="stop-btn" class="bg-red-500 hover:bg-red-600 text-white font-bold py-2 px-4 rounded">Stop</button>
            <button id="reset-btn" class="bg-blue-500 hover:bg-blue-600 text-white font-bold py-2 px-4 rounded">Reset</button>
        </div>
        <div class="mt-8">
            <p class="text-lg">Session Type: <span id="session-type" class="font-bold">Work</span></p>
            <p class="text-lg">Completed Sessions: <span id="completed-sessions" class="font-bold">0</span></p>
        </div>
        <div class="mt-8">
            <h2 class="text-2xl font-bold mb-4">Settings</h2>
            <div class="flex justify-center space-x-4">
                <div>
                    <label for="work-duration">Work (min):</label>
                    <input type="number" id="work-duration" class="bg-gray-700 text-white p-2 rounded w-20" value="25">
                </div>
                <div>
                    <label for="short-break">Short Break (min):</label>
                    <input type="number" id="short-break" class="bg-gray-700 text-white p-2 rounded w-20" value="5">
                </div>
                <div>
                    <label for="long-break">Long Break (min):</label>
                    <input type="number" id="long-break" class="bg-gray-700 text-white p-2 rounded w-20" value="15">
                </div>
            </div>
        </div>
    </div>
    <audio id="alarm-sound" src="https://www.soundjay.com/buttons/sounds/button-1.mp3" preload="auto"></audio>
    <script src="script.js"></script>
</body>
</html>
