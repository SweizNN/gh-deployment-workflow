apiVersion: serving.knative.dev/v1
kind: Service
metadata:
  name: local-knative-deneme
  namespace: default
spec:
  template:
    metadata:
      annotations:
        autoscaling.knative.dev/target: "1" # Aynı anda 1'den fazla istek gelirse yeni Pod aç!
    spec:
      containers:
        - image: dev.local/gh-deployment-workflow:local
          imagePullPolicy: Never
          ports:
            - containerPort: 80