name: Deploy to GitHub Pages

# Workflow'u hangi olayların tetikleyeceğini belirliyoruz
on:
  push:
    branches:
      - main
    # SADECE index.html değiştiğinde tetikle (Proje gereksinimi)
    paths:
      - 'index.html'

# GitHub Pages'e yazma yetkisi vermek için gerekli izinler
permissions:
  contents: read
  pages: write
  id-token: write

# Aynı anda birden fazla deployment çakışmasını önler
concurrency:
  group: "pages"
  cancel-in-progress: true

jobs:
  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
      
      - name: Setup Pages
        uses: actions/configure-pages@v5
      
      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          # Root dizini (bulunduğumuz dizin) yükle
          path: '.'
      
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
