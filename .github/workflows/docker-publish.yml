name: Docker Build and Push

on:
  push:
    branches: [ "main" ]

# GitHub Container Registry'ye (GHCR) imaj yükleyebilmek için yazma yetkisi veriyoruz
permissions:
  packages: write
  contents: read
  id-token: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Kodu Klonla
        uses: actions/checkout@v4

      - name: GitHub Container Registry'ye Giriş Yap
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker İmajını Derle ve Yükle
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # İmajın adını belirliyoruz. Tüm harfler küçük olmalı!
          # Örnek etiket: ghcr.io/kullaniciadin/gh-deployment-workflow:latest
          tags: ghcr.io/sweiznn/gh-deployment-workflow:latest
