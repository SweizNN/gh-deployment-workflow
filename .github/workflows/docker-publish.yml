name: Docker Build and Push

on:
  push:
    branches: [ "main" ]

# GitHub Container Registry'ye (GHCR) imaj yükleyebilmek için yazma yetkisi veriyoruz
permissions:
  packages: write
  contents: read
  id-token: write

# 1. AŞAMA: Kodun Test Edilmesi
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Kodu Klonla
        uses: actions/checkout@v4

      - name: Node.js Kurulumu
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Bağımlılıkları Yükle
        run: npm install --if-present

      - name: Testleri Çalıştır
        run: npm test

  # 2. AŞAMA: Docker İmajının Derlenmesi
  build:
    needs: test   # DİKKAT: Bu adımın çalışması için 'test' adımının BAŞARILI olması şarttır!
    runs-on: ubuntu-latest
    steps:
      - name: Kodu Klonla
        uses: actions/checkout@v4

      - name: GitHub Container Registry'ye Giriş Yap
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker İmajını Derle ve Yükle
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # İmajın adını belirliyoruz. Tüm harfler küçük olmalı!
          tags: ghcr.io/sweiznn/gh-deployment-workflow:latest

  # 3. AŞAMA: AWS EC2'ye Dağıtım (Kubernetes ile)
  deploy-to-ec2:
    needs: build
    runs-on: ubuntu-latest
    steps:
      - name: EC2'ye Bağlan ve K8s ile Deploy Et
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # 1. Adım: Sunucunun içinde anında bir Kubernetes YAML dosyası yaratıyoruz
            cat << 'EOF' > web-site-prod.yaml
            apiVersion: apps/v1
            kind: Deployment
            metadata:
              name: web-site-deployment
            spec:
              replicas: 2
              selector:
                matchLabels:
                  app: web-site
              template:
                metadata:
                  labels:
                    app: web-site
                spec:
                  containers:
                    - name: web-site
                      image: ghcr.io/sweiznn/gh-deployment-workflow:latest
                      imagePullPolicy: Always
                      ports:
                        - containerPort: 80
            ---
            apiVersion: v1
            kind: Service
            metadata:
              name: web-site-service
            spec:
              type: NodePort
              selector:
                app: web-site
              ports:
                - port: 80
                  targetPort: 80
                  nodePort: 30090
            EOF
            
            # 2. Adım: Bu YAML dosyasını Kubernetes'e uygula
            kubectl apply -f web-site-prod.yaml
            
            # 3. Adım: Yeni kodları yansıtmak için podları güvenli bir şekilde (kesinti yapmadan) yenile
            kubectl rollout restart deployment web-site-deployment
