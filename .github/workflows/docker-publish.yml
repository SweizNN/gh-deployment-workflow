name: Docker Build and Push

on:
  push:
    branches: [ "main" ]

# GitHub Container Registry'ye (GHCR) imaj yükleyebilmek için yazma yetkisi veriyoruz
permissions:
  packages: write
  contents: read
  id-token: write

# 1. AŞAMA: Kodun Test Edilmesi
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - name: Kodu Klonla
        uses: actions/checkout@v4

      - name: Node.js Kurulumu
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Bağımlılıkları Yükle
        run: npm install --if-present

      - name: Testleri Çalıştır
        run: npm test

  # 2. AŞAMA: Docker İmajının Derlenmesi
  build:
    needs: test   # DİKKAT: Bu adımın çalışması için 'test' adımının BAŞARILI olması şarttır!
    runs-on: ubuntu-latest
    steps:
      - name: Kodu Klonla
        uses: actions/checkout@v4

      - name: GitHub Container Registry'ye Giriş Yap
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker İmajını Derle ve Yükle
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          # İmajın adını belirliyoruz. Tüm harfler küçük olmalı!
          tags: ghcr.io/sweiznn/gh-deployment-workflow:latest

  # 3. AŞAMA: AWS EC2'ye Dağıtım
  deploy-to-ec2:
    needs: build   # Bu adımın çalışması için 'build' adımının BAŞARILI olması şarttır!
    runs-on: ubuntu-latest
    steps:
      - name: EC2'ye Bağlan ve Deploy Et
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USERNAME }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |
            # Çalışan eski container'ı durdur ve sil (İlk kurulumda hata vermemesi için || true ekliyoruz)
            docker stop web-site || true
            docker rm web-site || true
            
            # Güncellenmiş en yeni imajı indir
            docker pull ghcr.io/sweiznn/gh-deployment-workflow:latest
            
            # Yeni imajı 9090 portunda arka planda çalıştır
            docker run -d --name web-site -p 9090:80 ghcr.io/sweiznn/gh-deployment-workflow:latest